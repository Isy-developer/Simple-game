<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Avoid Game</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0b1220;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
      }
      #wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 10px 14px;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        color: rgba(255, 255, 255, 0.85);
      }
      header .pill {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 13px;
      }
      canvas {
        flex: 1;
        width: 100%;
        height: 100%;
        display: block;
      }
      .hint {
        padding: 10px 14px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.65);
      }
      .kbd {
        padding: 2px 6px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-bottom-color: rgba(255, 255, 255, 0.28);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.9);
        font-weight: 600;
        font-size: 12px;
      }
      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .overlay .card {
        width: min(520px, calc(100vw - 28px));
        background: rgba(10, 16, 30, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        padding: 18px 18px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }
      .overlay h1 {
        margin: 0 0 10px 0;
        font-size: 20px;
        color: rgba(255, 255, 255, 0.95);
      }
      .overlay p {
        margin: 8px 0;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.75);
        font-size: 14px;
      }
      .overlay .big {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="wrap" style="position: relative;">
      <header>
        <div class="pill">Avoid mode</div>
        <div class="pill" id="hud">Score: 0</div>
        <div class="pill" id="best">Best: 0</div>
        <div class="pill" id="status"></div>
      </header>

      <div class="hint">
        Move with <span class="kbd">←</span> / <span class="kbd">→</span>. Start/Restart
        with <span class="kbd">Space</span>. Pause/Resume with <span class="kbd">P</span>
        (or <span class="kbd">Esc</span>). Touch: drag to move.
      </div>

      <canvas id="game" aria-label="Avoid falling obstacles game"></canvas>

      <div class="overlay" id="overlay" aria-hidden="true">
        <div class="card" id="overlayCard">
          <h1>Simple Avoid Game</h1>
          <p>
            Stay on screen and avoid falling blocks. If a block hits you,
            the run ends.
          </p>
          <p>
            Press <span class="kbd">Space</span> to start.
          </p>
          <p>
            Pause/Resume: <span class="kbd">P</span> or <span class="kbd">Esc</span>.
          </p>
          <div class="big" id="overlayBig" style="display: none;"></div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d", { alpha: false });
        const hudEl = document.getElementById("hud");
        const bestEl = document.getElementById("best");
        const statusEl = document.getElementById("status");
        const overlay = document.getElementById("overlay");
        const overlayBig = document.getElementById("overlayBig");

        const bestKey = "simple_avoid_best_v1";
        const getBest = () => {
          const v = Number(localStorage.getItem(bestKey) || 0);
          return Number.isFinite(v) ? v : 0;
        };
        const setBest = (v) => localStorage.setItem(bestKey, String(v));
        bestEl.textContent = `Best: ${getBest()}`;

        // --- Canvas sizing (HiDPI aware) ---
        const view = { w: 960, h: 540 };
        const dpr = () => Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));

        function resize() {
          const rect = canvas.getBoundingClientRect();
          const scale = dpr();
          canvas.width = Math.max(320, Math.floor(rect.width * scale));
          canvas.height = Math.max(240, Math.floor(rect.height * scale));

          // Logical coordinate system: keep a stable "game space"
          // by mapping to canvas pixels each frame.
          view.w = 960;
          view.h = 540;
        }
        window.addEventListener("resize", resize);
        resize();

        // --- Game state ---
        const Keys = {
          left: false,
          right: false,
        };

        // --- Audio (simple tones; created after first user gesture) ---
        let audioCtx = null;
        function ensureAudio() {
          if (audioCtx) return;
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return;
          audioCtx = new Ctx();
        }
        function playTone(freq, durMs, type, vol) {
          try {
            if (!audioCtx) return;
            const t0 = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type || "sine";
            osc.frequency.value = freq;
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0, t0);
            gain.gain.linearRampToValueAtTime(vol || 0.05, t0 + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + durMs / 1000);
            osc.start(t0);
            osc.stop(t0 + durMs / 1000 + 0.02);
          } catch {
            // Ignore audio failures (some browsers block until gesture).
          }
        }

        const player = {
          x: view.w / 2 - 25,
          y: view.h - 70,
          w: 50,
          h: 20,
          speed: 420, // units/sec
        };

        /** @type {{x:number,y:number,w:number,h:number,vy:number,spawnedAt:number,grace:number}[]} */
        let blocks = [];

        /** @type {{x:number,y:number,w:number,h:number,vy:number,type:"shield"|"slow"}[]} */
        let powerups = [];

        /** @type {{x:number,y:number,vx:number,vy:number,life:number,ttl:number,size:number,color:string}[]} */
        let particles = [];

        let state = "ready"; // "ready" | "playing" | "paused" | "over"
        let lastT = 0;
        let score = 0;
        let spawnTimer = 0;
        let difficulty = 0; // grows with score
        let simTime = 0; // in-game time (scaled by slow-mo)

        const SLOW_MUL = 0.45;
        const SPAWN_GRACE = 0.35; // ignore collisions for blocks shortly after spawn (in-game time)

        let shieldTime = 0; // seconds (real time)
        let slowTime = 0; // seconds (real time)
        let shake = { time: 0, dur: 0, mag: 0 };

        // Touch/drag control: keep a desired x position.
        const pointer = {
          active: false,
          gameX: view.w / 2,
          id: null,
        };

        function clamp(n, a, b) {
          return Math.max(a, Math.min(b, n));
        }

        function clientXToGameX(clientX) {
          const rect = canvas.getBoundingClientRect();
          const u = (clientX - rect.left) / Math.max(1, rect.width);
          return clamp(u * view.w, 0, view.w);
        }

        function triggerShake(mag, time) {
          shake = { time, dur: time, mag };
        }

        function spawnParticles(x, y, kind) {
          const count = kind === "hit" ? 18 : 26;
          const baseColor = kind === "hit" ? "#ff4d6d" : "#6ee7ff";
          for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = (kind === "hit" ? 140 : 110) + Math.random() * 120;
            const vx = Math.cos(a) * s;
            const vy = Math.sin(a) * s - (kind === "hit" ? 40 : 10);
            const ttl = 0.35 + Math.random() * 0.35;
            particles.push({
              x,
              y,
              vx,
              vy,
              life: ttl,
              ttl,
              size: 2 + Math.random() * 5,
              color: baseColor,
            });
          }
        }

        function reset() {
          blocks = [];
          powerups = [];
          particles = [];
          score = 0;
          difficulty = 0;
          spawnTimer = 0;
          simTime = 0;
          shieldTime = 0;
          slowTime = 0;
          shake = { time: 0, dur: 0, mag: 0 };

          player.x = view.w / 2 - player.w / 2;
          player.y = view.h - 70;
          state = "playing";
          overlayBig.style.display = "none";
          overlay.style.opacity = "0";
          hudEl.textContent = `Score: ${Math.floor(score)}`;
          statusEl.textContent = "";
          overlay.setAttribute("aria-hidden", "true");
          lastT = 0;
          playTone(440, 90, "sine", 0.05);
        }

        function showOverlay(text) {
          if (text) {
            overlayBig.textContent = text;
            overlayBig.style.display = "block";
          } else {
            overlayBig.style.display = "none";
          }
          overlay.style.opacity = "1";
          overlay.setAttribute("aria-hidden", "false");
        }

        function gameOver() {
          state = "over";
          overlay.style.opacity = "1";

          const s = Math.floor(score);
          const b = getBest();
          if (s > b) {
            setBest(s);
            bestEl.textContent = `Best: ${s}`;
          } else {
            bestEl.textContent = `Best: ${getBest()}`;
          }

          showOverlay("Game Over");
          playTone(110, 260, "square", 0.05);

          // A small hit effect on the player position.
          spawnParticles(player.x + player.w / 2, player.y + player.h / 2, "hit");
          triggerShake(5, 0.22);
        }

        function spawnPowerup() {
          const types = ["shield", "slow"];
          const type = types[Math.floor(Math.random() * types.length)];
          const size = 18 + Math.random() * 8;
          const x = Math.random() * (view.w - size);
          const y = -size - 10;
          const vy = 90 + difficulty * 40 + Math.random() * 30;

          powerups.push({
            x,
            y,
            w: size,
            h: size,
            vy,
            type,
          });
        }

        function spawnBlock() {
          // Block sizes vary slightly; keep player safe zone by ensuring block width is reasonable.
          const w = 18 + Math.random() * 28;
          const h = 16 + Math.random() * 22;
          const x = Math.random() * (view.w - w);

          // Difficulty increases with time; falling speed gets higher.
          const vy = 120 + difficulty * 85 + Math.random() * (20 + difficulty * 25);

          blocks.push({
            x,
            y: -h - 5,
            w,
            h,
            vy,
            spawnedAt: simTime,
            grace: SPAWN_GRACE,
          });

          // Occasionally spawn a power-up alongside the pressure.
          if (Math.random() < 0.22) spawnPowerup();
        }

        function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
          return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
        }

        function draw() {
          // Map logical view -> canvas pixels
          const sx = canvas.width / view.w;
          const sy = canvas.height / view.h;
          ctx.setTransform(sx, 0, 0, sy, 0, 0);

          // Screen shake (in-game units, scaled by view transform).
          ctx.save();
          if (shake.time > 0 && shake.dur > 0) {
            const k = shake.time / shake.dur;
            ctx.translate(
              (Math.random() - 0.5) * 2 * shake.mag * k,
              (Math.random() - 0.5) * 2 * shake.mag * k * 0.35
            );
          }

          // Background
          ctx.fillStyle = "#0b1220";
          ctx.fillRect(0, 0, view.w, view.h);

          // Subtle grid/scanlines
          ctx.strokeStyle = "rgba(255,255,255,0.05)";
          ctx.lineWidth = 1 / Math.max(sx, sy);
          for (let x = 0; x <= view.w; x += 48) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, view.h);
            ctx.stroke();
          }

          // Player
          ctx.fillStyle = "#6ee7ff";
          ctx.fillRect(player.x, player.y, player.w, player.h);
          // Player "glow"
          ctx.fillStyle = "rgba(110,231,255,0.25)";
          ctx.fillRect(player.x - 6, player.y - 8, player.w + 12, player.h + 16);

          // Blocks
          for (const b of blocks) {
            const graceLeft = b.grace - (simTime - b.spawnedAt);
            if (graceLeft > 0) ctx.globalAlpha = clamp(graceLeft / b.grace, 0.25, 1);
            else ctx.globalAlpha = 1;

            ctx.fillStyle = "#ff4d6d";
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.fillStyle = "rgba(255,77,109,0.25)";
            ctx.fillRect(b.x - 3, b.y - 3, b.w + 6, b.h + 6);
          }

          ctx.globalAlpha = 1;

          // Powerups
          for (const p of powerups) {
            if (p.type === "shield") {
              ctx.fillStyle = "rgba(167,139,250,0.95)";
              ctx.fillRect(p.x, p.y, p.w, p.h);
              ctx.strokeStyle = "rgba(167,139,250,0.35)";
              ctx.lineWidth = 2 / Math.max(sx, sy);
              ctx.strokeRect(p.x + 2, p.y + 2, p.w - 4, p.h - 4);
            } else {
              // slow
              ctx.fillStyle = "rgba(52,211,153,0.95)";
              ctx.fillRect(p.x, p.y, p.w, p.h);
              ctx.strokeStyle = "rgba(52,211,153,0.35)";
              ctx.lineWidth = 2 / Math.max(sx, sy);
              ctx.strokeRect(p.x + 2, p.y + 2, p.w - 4, p.h - 4);
            }
          }

          // Particles (small circles)
          for (const pt of particles) {
            const a = clamp(pt.life / pt.ttl, 0, 1);
            ctx.fillStyle = pt.color;
            ctx.globalAlpha = a;
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;

          // Ground line
          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.beginPath();
          ctx.moveTo(0, player.y + player.h + 10);
          ctx.lineTo(view.w, player.y + player.h + 10);
          ctx.stroke();

          ctx.restore();
        }

        function tick(t) {
          const now = t || 0;
          const dt = lastT ? Math.min(0.033, (now - lastT) / 1000) : 0;
          lastT = now;

          // Always render at least once.
          if (state === "ready") {
            // idle animate a slight "pulse" by moving overlay opacity and keeping blocks empty.
            draw();
            hudEl.textContent = `Score: 0`;
            overlay.style.opacity = "1";
            overlayBig.style.display = "none";
            statusEl.textContent = "";
            requestAnimationFrame(tick);
            return;
          }

          const slowMul = slowTime > 0 ? SLOW_MUL : 1;
          const dtSim = dt * slowMul;

          if (state === "paused") {
            // No simulation while paused; just keep drawing.
            showOverlay("Paused");
            overlay.style.opacity = "1";
            statusEl.textContent =
              shieldTime > 0 || slowTime > 0 ? "Power-ups active" : "";
            draw();
            requestAnimationFrame(tick);
            return;
          }

          if (state === "playing") {
            // Update timers (real time)
            shieldTime = Math.max(0, shieldTime - dt);
            slowTime = Math.max(0, slowTime - dt);
            if (shake.time > 0) shake.time = Math.max(0, shake.time - dt);

            // Update score based on "game time" (slowed during slow-mo).
            score += dtSim * 40;
            difficulty = score / 600; // soft ramp
            hudEl.textContent = `Score: ${Math.floor(score)}`;

            // Player movement
            if (pointer.active) {
              player.x = clamp(pointer.gameX - player.w / 2, 0, view.w - player.w);
            } else {
              const dir = (Keys.right ? 1 : 0) - (Keys.left ? 1 : 0);
              player.x += dir * player.speed * dt;
              player.x = clamp(player.x, 0, view.w - player.w);
            }

            // Advance in-game time (used for spawn grace).
            simTime += dtSim;
            statusEl.textContent = [
              shieldTime > 0 ? `Shield: ${shieldTime.toFixed(1)}s` : "",
              slowTime > 0 ? `Slow: ${slowTime.toFixed(1)}s` : "",
            ]
              .filter(Boolean)
              .join(" / ");

            // Spawn blocks: faster over time, but keep sane caps.
            const baseInterval = 0.95; // seconds
            const interval = clamp(baseInterval - difficulty * 0.15, 0.32, 0.95);

            spawnTimer += dtSim;
            while (spawnTimer >= interval) {
              spawnTimer -= interval;
              spawnBlock();
            }

            // Update blocks positions
            for (const b of blocks) {
              b.y += b.vy * dtSim;
            }
            // Remove blocks that passed the bottom
            blocks = blocks.filter((b) => b.y <= view.h + b.h + 10);

            // Update powerups
            for (const p of powerups) {
              p.y += p.vy * dtSim;
            }
            powerups = powerups.filter((p) => p.y <= view.h + p.h + 10);

            // Collision check: powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
              const p = powerups[i];
              if (aabb(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
                if (p.type === "shield") {
                  shieldTime = Math.max(shieldTime, 4.5);
                  playTone(740, 160, "triangle", 0.05);
                  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, "power");
                } else {
                  slowTime = Math.max(slowTime, 4.0);
                  playTone(520, 180, "sine", 0.05);
                  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, "power");
                }
                triggerShake(2.5, 0.12);
                powerups.splice(i, 1);
              }
            }

            // Collision check: blocks
            for (let i = 0; i < blocks.length; i++) {
              const b = blocks[i];
              if (!aabb(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) continue;

              // Spawn grace: ignore hits just after the block spawns.
              if (simTime - b.spawnedAt < b.grace) continue;

              if (shieldTime > 0) {
                // Consume shield briefly (don't instantly drain everything).
                shieldTime = Math.max(0, shieldTime - 1.4);
                playTone(250, 200, "square", 0.05);
                spawnParticles(player.x + player.w / 2, player.y + player.h / 2, "hit");
                triggerShake(6, 0.18);
                // Remove the colliding block so you get a momentary survival benefit.
                blocks.splice(i, 1);
                break;
              }

              gameOver();
              break;
            }

            // Update particles
            for (const pt of particles) {
              pt.x += pt.vx * dtSim;
              pt.y += pt.vy * dtSim;
              pt.vy += 260 * dtSim; // light gravity
              pt.life -= dt;
            }
            particles = particles.filter((pt) => pt.life > 0);
          }

          // Draw each frame
          draw();

          requestAnimationFrame(tick);
        }

        function startIfSpace() {
          if (state === "paused") {
            state = "playing";
            overlay.style.opacity = "0";
            overlay.setAttribute("aria-hidden", "true");
            overlayBig.style.display = "none";
            playTone(560, 100, "sine", 0.05);
            return;
          }
          if (state === "playing") return;
          if (state === "over" || state === "ready") reset();
        }

        window.addEventListener("keydown", (e) => {
          if (e.code === "ArrowLeft") Keys.left = true;
          if (e.code === "ArrowRight") Keys.right = true;
          if (e.code === "KeyP" || e.code === "Escape") {
            if (state === "playing") {
              ensureAudio();
              state = "paused";
              showOverlay("Paused");
              playTone(320, 90, "square", 0.04);
            } else if (state === "paused") {
              state = "playing";
              overlay.style.opacity = "0";
              overlay.setAttribute("aria-hidden", "true");
              overlayBig.style.display = "none";
              playTone(560, 100, "sine", 0.05);
            }
            e.preventDefault();
            return;
          }
          if (e.code === "Space") {
            ensureAudio();
            e.preventDefault();
            startIfSpace();
          }
        });
        window.addEventListener("keyup", (e) => {
          if (e.code === "ArrowLeft") Keys.left = false;
          if (e.code === "ArrowRight") Keys.right = false;
        });

        // Touch/drag controls
        canvas.addEventListener("pointerdown", (e) => {
          // Only react to primary button (mouse) or any touch/pen.
          if (e.pointerType === "mouse" && e.button !== 0) return;
          ensureAudio();

          if (state === "paused") {
            state = "playing";
            overlay.style.opacity = "0";
            overlay.setAttribute("aria-hidden", "true");
            overlayBig.style.display = "none";
          } else if (state === "ready" || state === "over") {
            reset();
          }

          pointer.active = true;
          pointer.id = e.pointerId;
          pointer.gameX = clientXToGameX(e.clientX);
          try {
            canvas.setPointerCapture(e.pointerId);
          } catch {
            // ignore
          }
        });
        canvas.addEventListener("pointermove", (e) => {
          if (!pointer.active) return;
          pointer.gameX = clientXToGameX(e.clientX);
        });
        canvas.addEventListener("pointerup", (e) => {
          if (e.pointerId !== pointer.id) return;
          pointer.active = false;
          pointer.id = null;
          try {
            canvas.releasePointerCapture(e.pointerId);
          } catch {
            // ignore
          }
        });
        canvas.addEventListener("pointercancel", (e) => {
          if (e.pointerId !== pointer.id) return;
          pointer.active = false;
          pointer.id = null;
        });

        // Initial overlay
        showOverlay("");
        overlay.style.opacity = "1";

        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
